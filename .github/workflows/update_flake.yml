name: Update Flake

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Remove GitHub auth headers
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://api.github.com/.extraheader || true
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all http.https://api.github.com/.extraheader || true

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake still evaluates
        run: nix flake check --show-trace

      - name: Verify lib and modules still export correctly
        run: |
          nix eval .#lib --apply builtins.attrNames
          nix eval .#nixosModules.default --apply 'x: "ok"'
          nix eval .#homeModules.default --apply 'x: "ok"'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-flake-lock
          commit-message: "flake: update flake.lock"
          title: "Update flake.lock"
          body: |
            Automated weekly `flake.lock` update.

            Updated inputs:
            - `nixpkgs`
            - `stylix`

            Flake check passed — lib, nixosModules, and homeModules all evaluate correctly.
          labels: |
            dependencies
            automated
          delete-branch: true
